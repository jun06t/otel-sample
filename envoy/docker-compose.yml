version: "3"

services:
  envoy:
    build:
      context: ./sidecar
    ports:
      - "10000:10000"
      - "9901:9901"
    depends_on:
      - gateway
      - jaeger
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - TARGET=gateway
    environment:
      - BACKEND_ADDR=backend-grpc:8080
      - SAMPLING_RATIO=1
      - EXPORTER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      - jaeger
  backend-grpc:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - TARGET=backend-grpc
    environment:
      - EXPORTER_ENDPOINT=http://jaeger:14268/api/traces
      - SAMPLING_RATIO=1
    depends_on:
      - jaeger
  jaeger:
    image: "jaegertracing/all-in-one:1.42"
    ports:
      - "16686:16686"
      - "14268:14268"
      - "9411:9411"
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - COLLECTOR_OTLP_ENABLED=true
